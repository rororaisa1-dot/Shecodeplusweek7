  <body>
  <div class="app">
  <header>
    <form class="search-form" id="search-form">
      <input type="search"
       placeholder="Enter city name..." required 
             id="search-form-input"
        class="search-form-input" />
      <input type="submit" value="Search" class="seach-form-button"/>
    </form> 
  </header>
  <main>
    <div class="weather-app-info">
      <div>
      <h1 class="h1-app-city" id="h1-weather-app-city"> Paris</h1>
      <p class="city-weather-details">
        <span id="time"></span>
        <span id= "description">
        </span>      <br />
        Humidity:<strong id="humidity"></strong>, Wind: <strong id="wind-speed"></strong>
      </p>
      </div>
      <div class="weather-app-container">
        <div id="icon">
      <div class="weather-app-icon">
        <img src="http://shecodes-assets.s3.amazonaws.com/api/weather/icons/broken-clouds-night.png" />
          </div>
      </div>
      <div class="weather-app-temperature" id="temperature"></div>
      <div class="weather-app-units">°C</div>
    </div>
    </div>
  </main> 
</body>
